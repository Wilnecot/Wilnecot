<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1280" height="360" viewBox="0 0 1280 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0B0E"/>
      <stop offset="100%" stop-color="#15161a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <style>
      .title { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 800; }
      .subtitle { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 500; }
      .chip { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-weight: 600; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1280" height="360" fill="url(#g1)"/>

  <!-- Honey comb motif -->
  <g transform="translate(900, 40)" opacity="0.18">
    <g fill="none" stroke="#D4AF37" stroke-width="2">
      <polygon points="60,0 120,35 120,105 60,140 0,105 0,35"/>
      <polygon points="180,0 240,35 240,105 180,140 120,105 120,35"/>
      <polygon points="120,70 180,105 180,175 120,210 60,175 60,105"/>
      <polygon points="300,70 360,105 360,175 300,210 240,175 240,105"/>
      <polygon points="240,140 300,175 300,245 240,280 180,245 180,175"/>
    </g>
  </g>

  <!-- Title -->
  <text x="80" y="150" class="title" font-size="56" fill="#D4AF37" filter="url(#shadow)">
    Wilmer Ricardo Urda
  </text>

  <!-- Subtitle -->
  <text x="80" y="200" class="subtitle" font-size="26" fill="#FFFFFF" opacity="0.92">
    Apicultura · Software · Ambiente
  </text>

  <!-- Chips -->
  <g transform="translate(80, 240)">
    <rect x="0" y="-26" rx="14" ry="14" width="210" height="40" fill="#111318" stroke="#2a2d36" opacity="0.9"/>
    <text x="18" y="0" class="chip" font-size="18" fill="#D4AF37">Python · Android/Kotlin</text>

    <rect x="230" y="-26" rx="14" ry="14" width="200" height="40" fill="#111318" stroke="#2a2d36" opacity="0.9"/>
    <text x="248" y="0" class="chip" font-size="18" fill="#D4AF37">SGApiarios</text>

    <rect x="450" y="-26" rx="14" ry="14" width="250" height="40" fill="#111318" stroke="#2a2d36" opacity="0.9"/>
    <text x="468" y="0" class="chip" font-size="18" fill="#D4AF37">Mente de Negocios</text>
  </g>

  <!-- Palette swatches -->
  <g transform="translate(1080, 300)">
    <rect x="0" y="0" width="30" height="30" fill="#0B0B0E" stroke="#2a2d36"/>
    <rect x="38" y="0" width="30" height="30" fill="#D4AF37" stroke="#2a2d36"/>
    <rect x="76" y="0" width="30" height="30" fill="#FFFFFF" stroke="#2a2d36"/>
  </g>
</svg>
